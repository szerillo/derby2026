name: Scrape NYRA Bets pool

on:
  schedule:
    # Every 5 minutes (GitHub's minimum reliable cron interval).
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Scrape probables
        run: node scripts/scrape_pool.js

      - name: Commit refreshed payouts
        run: |
          git config user.email "actions@users.noreply.github.com"
          git config user.name "nyra-pool-bot"
          # Always commit on a successful scrape — the JSON now includes pool_totals which
          # reliably grows every run (bets coming in), so the file is genuinely fresh even
          # when NYRA's per-combo probables haven't refreshed yet.
          if git diff --quiet -- data/derby_pool_payouts.json; then
            echo "No diff (script may have failed silently). Skipping."
            exit 0
          fi
          git add data/derby_pool_payouts.json
          git commit -m "Auto-update pool payouts ($(date -u +%H:%M)Z)"
          git push
          echo "Pushed."
