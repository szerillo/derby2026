name: Scrape NYRA Bets pool

on:
  schedule:
    # Every 5 minutes (GitHub's minimum reliable cron interval).
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Scrape probables
        run: node scripts/scrape_pool.js

      - name: Commit if data changed
        run: |
          git config user.email "actions@users.noreply.github.com"
          git config user.name "nyra-pool-bot"
          # If only the timestamp changed, skip commit. Compare ignoring the updated_at line.
          if git diff --quiet -- data/derby_pool_payouts.json; then
            echo "No changes to commit."
            exit 0
          fi
          changed_lines=$(git diff -- data/derby_pool_payouts.json | grep -E '^[+-][^+-]' | grep -v 'updated_at' | wc -l)
          if [ "$changed_lines" -eq 0 ]; then
            echo "Only timestamp changed; skipping commit."
            git checkout -- data/derby_pool_payouts.json
          else
            git add data/derby_pool_payouts.json
            git commit -m "Auto-update pool payouts ($(date -u +%H:%M)Z)"
            git push
            echo "Pushed updated payouts."
          fi
